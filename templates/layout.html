<!DOCTYPE html>
<html>
<head>

<title>HealFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
display:flex;
background:#f6f7fb;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:linear-gradient(180deg,#6a5cff,#4e3fff);
height:100vh;
color:white;
padding:30px 20px;
}

.sidebar h2{
margin-bottom:40px;
}

.sidebar a{
display:block;
padding:14px;
margin:6px 0;
color:white;
text-decoration:none;
border-radius:10px;
}

.sidebar a:hover{
background:rgba(255,255,255,0.15);
}

/* MAIN */

.main{
flex:1;
padding:40px;
}

/* CARDS */

.grid{
display:flex;
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 5px 15px rgba(0,0,0,0.06);
flex:1;
}

.big{
font-size:28px;
font-weight:600;
}

.green{color:#2ecc71;}
.red{color:#e74c3c;}
.purple{color:#6a5cff;}

/* LOG BOX */

.log{
margin-top:40px;
background:#0e1930;
color:#9bb1ff;
padding:25px;
border-radius:14px;
height:220px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>⚡ HealFlow</h2>

<a href="/">Dashboard</a>
<a href="/run">Run Tests</a>
<a href="/reports">Reports</a>
<a href="/healing">Healing History</a>
<a href="/users">User Management</a>


</div>

<div class="main">
{% block content %}{% endblock %}
</div>

</body>
</html>
