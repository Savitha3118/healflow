<!DOCTYPE html>
<html>
<head>
<title>HealFlow Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f6fb;
}

/* SIDEBAR */
.sidebar{
position:fixed;
width:240px;
height:100%;
background:linear-gradient(180deg,#6a5cff,#5b49d6);
color:white;
padding:30px 20px;
}

.sidebar h2{margin-bottom:30px;}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.sidebar a:hover{
background:rgba(255,255,255,0.15);
}

/* MAIN */
.main{
margin-left:260px;
padding:40px;
}

/* STAT BOXES */
.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.stat{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 4px 14px rgba(0,0,0,0.06);
}

.stat h3{margin:0;color:#777;font-size:14px;}
.stat h1{margin-top:8px;font-size:28px;}

/* GRID */
.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
}

/* CARD */
.card{
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>⚡ HealFlow</h2>
<a href="/">Dashboard</a>
<a href="/run">Run Tests</a>
<a href="/reports">Reports</a>
<a href="/healing">Healing History</a>
<a href="/users">User Management</a>
</div>

<!-- MAIN -->
<div class="main">

<h1>Dashboard</h1>

<!-- STAT CARDS -->
<div class="stats">

<div class="stat">
<h3>Total Tests</h3>
<h1>{{stats.total}}</h1>
</div>

<div class="stat">
<h3>Passed</h3>
<h1 style="color:#16a34a">{{stats.passed}}</h1>
</div>

<div class="stat">
<h3>Failed</h3>
<h1 style="color:#ef4444">{{stats.failed}}</h1>
</div>

<div class="stat">
<h3>Healed</h3>
<h1 style="color:#7c3aed">{{stats.healed}}</h1>
</div>

</div>

<!-- GRAPH AREA -->
<div class="grid">

<!-- TREND -->
<div class="card">
<h3>Execution Trend</h3>
<canvas id="trendChart" height="120"></canvas>
</div>


<!-- GREEN HEALING CONFIDENCE -->
<div class="card">

<h3>Healing Confidence</h3>

<div style="position:relative;width:240px;margin:auto;">

<canvas id="confidenceChart"></canvas>

<div style="
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
">

<div style="font-size:38px;font-weight:700;color:#16a34a;">
88.1%
</div>

<div style="color:#777;font-size:14px;">
Average Score
</div>

</div>

</div>

</div>

</div>

</div>


<script>

// EXECUTION TREND GRAPH
new Chart(document.getElementById('trendChart'),{

type:'line',

data:{
labels:['Feb 11','Feb 12','Feb 13','Feb 14','Feb 15','Feb 16','Feb 17'],
datasets:[{
label:'Tests',
data:[0,0,0,0,0,0,90],
borderColor:'#f59e0b',
tension:0.3
}]
}

});


// GREEN HEALING CONFIDENCE

new Chart(document.getElementById('confidenceChart'),{

type:'doughnut',

data:{
datasets:[{
data:[88,12],
backgroundColor:[
'#16a34a',
'#e5e7eb'
],
borderWidth:0
}]
},

options:{
cutout:'70%',
plugins:{legend:{display:false}}
}

});

</script>

</body>
</html>
