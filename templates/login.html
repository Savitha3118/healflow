<!DOCTYPE html>
<html>
<head>
    <title>HealFlow Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            
            /* background: linear-gradient(to right,#8f49e0, #ce7cee, #e8d3eb, #ce7cee, #8f49e0); */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #7c69f3, #b578ee);
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }
        .error-message {
        background-color: #ffdddd;
        color: #d8000c;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 5px;
        text-align: center;
        font-size: 14px;
}
    </style>
</head>
<body>

<div class="login-container">
    <h2>HealFlow Login</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="error">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% if error %}
    <div class="error-message">
        {{ error }}
    </div>
{% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
